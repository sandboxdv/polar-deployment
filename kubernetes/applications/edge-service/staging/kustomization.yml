apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - github.com/sandboxdv/edge-service/k8s?ref=main

patches:
  - path: patch-env.yml

configMapGenerator:
  - behavior: merge
    files:
      - application-staging.yml
    name: edge-config

images:
  - name: edge-service
    newName: ghcr.io/sandboxdv/edge-service
    newTag: latest

replicas:
  - name: edge-service
    count: 1