  - application-prod.yml
  name: catalog-config

images:
- name: catalog-service
  newName: ghcr.io/sandboxdv/catalog-service
  newTag: 8a9cce0540af74e0bd12de93e2a07861093acac9

replicas:
- count: 2
  name: catalog-service
